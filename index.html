function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(true);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function StatusDot({ status, size = 8 }) {
  const colors = { active: C.primary, inactive: C.g4, unassigned: C.warning };
  return <span style={{ width: size, height: size, borderRadius: '50%', background: colors[status] || C.g4, flexShrink: 0, display: 'inline-block' }} />;
}

function StatusPill({ status, motion }) {
  if (status === 'unassigned') return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: C.fUI, fontSize: 12, fontWeight: 500, color: '#9A6200', background: '#FFF8EC', border: '1px solid #FFE0A3', borderRadius: 65, padding: '3px 10px' }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: C.warning }} />Unassigned
    </span>
  );
  if (status === 'inactive') return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: C.fUI, fontSize: 12, fontWeight: 500, color: C.g1, background: C.g7, border: `1px solid ${C.g6}`, borderRadius: 65, padding: '3px 10px' }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: C.g4 }} />Inactive
    </span>
  );
  const isOp = motion === 'operating';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: C.fUI, fontSize: 12, fontWeight: 500, color: isOp ? '#3B6A00' : C.g1, background: isOp ? '#EEF7DE' : C.g7, border: `1px solid ${isOp ? '#CFE69A' : C.g6}`, borderRadius: 65, padding: '3px 10px' }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: isOp ? C.primary : C.g4 }} />
      {isOp ? 'Operating' : 'Idle'}
    </span>
  );
}

function AssetIcon({ type, size = 18, color = C.g3 }) {
  if (type === 'trailer') return Icon.trailer(size, color);
  if (type === 'container') return Icon.container(size, color);
  if (type === 'box') return Icon.box(size, color);
  if (type === 'machine') return Icon.machine(size, color);
  if (type === 'tool') return Icon.tool(size, color);
  return Icon.asset(size, color);
}

function MotionChip({ motion }) {
  const operating = motion === 'operating';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '2px 8px', borderRadius: 10,
      fontFamily: C.fUI, fontSize: 11, fontWeight: 500,
      color: operating ? C.primaryDark : C.g1,
      background: operating ? '#F1F8E0' : C.g8,
      border: `1px solid ${operating ? '#D5E8AB' : C.g6}`,
      flexShrink: 0,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: operating ? C.primary : C.g4 }} />
      {operating ? 'Operating' : 'Idle'}
    </span>
  );
}

function RecentChip({ tag, onClick }) {
  return (
    <div onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: C.white, border: `1px solid ${C.g6}`, borderRadius: 10, cursor: 'pointer' }}>
      <div style={{ width: 32, height: 32, borderRadius: 8, background: '#F1F8E0', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {Icon.ble(18, C.primaryDark)}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: C.fBody, fontSize: 14, fontWeight: 500, color: tag.asset ? C.charcoal : C.g1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{tag.asset ? tag.asset.name : 'Unassigned tag'}</div>
        <div style={{ fontFamily: C.fMono, fontSize: 11, color: C.g3, marginTop: 1, letterSpacing: '0.02em' }}>{tag.serial}</div>
      </div>
      <span style={{ fontFamily: C.fBody, fontSize: 11, color: C.g3 }}>9:41</span>
    </div>
  );
}

function AddressModal({ tag, onClose }) {
  const { address, coords } = tag;
  const lat = coords?.lat, lng = coords?.lng;
  const query = encodeURIComponent(address);

  const options = [
    { label: 'Open in Apple Maps',  action: () => window.open(`https://maps.apple.com/?q=${query}`) },
    { label: 'Open in Google Maps', action: () => window.open(`https://maps.google.com/?q=${query}`) },
    { label: 'Open in Waze',        action: () => window.open(`https://waze.com/ul?q=${query}`) },
    { label: 'Open in MAPS.ME',     action: () => window.open(`https://maps.me/map?ll=${lat},${lng}`) },
    { label: 'Copy coordinates',    action: () => navigator.clipboard?.writeText(`${lat}, ${lng}`) },
    { label: 'Share location',      action: () => navigator.share?.({ title: tag.asset?.name || tag.serial, text: address }) },
  ];

  return (
    <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 16px' }}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.white, borderRadius: 20, width: '100%', overflow: 'hidden', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ padding: '18px 20px 14px', fontFamily: C.fBody, fontSize: 15, color: C.charcoal, lineHeight: 1.5, borderBottom: `1px solid ${C.g7}` }}>
          {address}
        </div>
        <div style={{ padding: '10px 12px 4px', display: 'flex', flexDirection: 'column', gap: 8 }}>
          {options.map(o => (
            <button key={o.label} onClick={() => { o.action(); onClose(); }} style={{
              width: '100%', height: 50, borderRadius: 12, background: C.g8, border: 'none',
              fontFamily: C.fBody, fontSize: 16, fontWeight: 500, color: C.charcoal, cursor: 'pointer',
            }}>{o.label}</button>
          ))}
        </div>
        <div style={{ padding: '4px 12px 12px' }}>
          <button onClick={onClose} style={{
            width: '100%', height: 50, borderRadius: 12, background: C.g7, border: 'none',
            fontFamily: C.fBody, fontSize: 16, fontWeight: 600, color: C.g1, cursor: 'pointer',
          }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function TagRow({ tag, onClick, onAddressClick }) {
  const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  const title = tag.asset
    ? (tag.asset.name.toLowerCase().startsWith(tag.asset.type.toLowerCase())
        ? tag.asset.name
        : `${cap(tag.asset.type)} ${tag.asset.name}`)
    : 'Unassigned tag';
  return (
    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
      background: C.white, border: `1px solid ${C.g6}`, borderRadius: 10, marginBottom: 8, cursor: 'pointer',
    }}>
      <div style={{ width: 40, height: 40, borderRadius: 10, background: tag.status === 'active' ? '#F1F8E0' : tag.status === 'inactive' ? C.g7 : '#FFF8EC', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, position: 'relative' }}>
        {tag.asset ? <AssetIcon type={tag.asset.type} size={20} color={tag.status === 'active' ? C.primaryDark : tag.status === 'inactive' ? C.g3 : '#C47D00'} /> : Icon.ble(20, '#C47D00')}
        <span style={{ position: 'absolute', bottom: -2, right: -2, width: 12, height: 12, borderRadius: '50%', background: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <StatusDot status={tag.status} size={8} />
        </span>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontFamily: C.fBody, fontSize: 15, fontWeight: 500, color: tag.asset ? C.charcoal : C.g1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>
            {title}
          </span>
          {tag.asset && tag.status === 'active' && tag.motion && (
            <MotionChip motion={tag.motion} />
          )}
        </div>
        <div style={{ fontFamily: C.fMono, fontSize: 12, color: C.g1, marginTop: 3, letterSpacing: '0.02em', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{tag.serial}</div>
        <div style={{ fontFamily: C.fBody, fontSize: 12, color: C.g3, marginTop: 3, display: 'inline-flex', alignItems: 'center', gap: 5, whiteSpace: 'nowrap' }}>
          {Icon.clock(12, C.g3)}
          <span style={{ whiteSpace: 'nowrap' }}>{tag.status === 'inactive' ? `Last data ${tag.lastSync}` : tag.lastSync}</span>
        </div>
        {tag.address && (
          <button onClick={e => { e.stopPropagation(); onAddressClick(tag); }} style={{
            display: 'block', marginTop: 4, background: 'none', border: 'none', padding: 0,
            fontFamily: C.fBody, fontSize: 12, color: C.link, cursor: 'pointer',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%', textAlign: 'left',
          }}>
            {tag.address}
          </button>
        )}
      </div>
    </div>
  );
}

  const noRecent = tweaks.listState === 'no_recent';

    if (filter === 'Active' && t.status !== 'active') return false;
    if (filter === 'Inactive' && t.status !== 'inactive') return false;
    if (filter === 'Unassigned' && t.status !== 'unassigned') return false;

function Reticle({ style: scannerStyle, found, damaged }) {
  const size = 260;
  const ring = found ? C.primary : damaged ? C.warning : C.white;
  return (
    <div style={{ position: 'absolute', top: '42%', left: '50%', transform: 'translate(-50%, -50%)', width: size, height: size, zIndex: 20 }}>
      {['nw','ne','sw','se'].map(p => {
        const isN = p.startsWith('n'); const isW = p.endsWith('w');
        return <div key={p} style={{
          position: 'absolute',
          [isN ? 'top' : 'bottom']: 0, [isW ? 'left' : 'right']: 0,
          width: 36, height: 36,
          borderTop: isN ? `4px solid ${ring}` : 'none',
          borderBottom: !isN ? `4px solid ${ring}` : 'none',
          borderLeft: isW ? `4px solid ${ring}` : 'none',
          borderRight: !isW ? `4px solid ${ring}` : 'none',
          borderRadius: `${isN && isW ? 14 : 0}px ${isN && !isW ? 14 : 0}px ${!isN && !isW ? 14 : 0}px ${!isN && isW ? 14 : 0}px`,
          transition: 'border-color 0.25s',
        }} />;
      })}
      {!found && !damaged && (
        <div style={{ position: 'absolute', left: 4, right: 4, top: '50%', height: 2, background: `linear-gradient(90deg, transparent, ${C.primary}, transparent)`, boxShadow: `0 0 8px ${C.primary}` }} />

        <div style={{ position: 'absolute', inset: 0, background: 'rgba(101,178,0,0.18)', borderRadius: 14, animation: 'flash 0.4s ease-out' }} />
      )}

  );
}

function TagDetailSheet({ platform, tag, onBack, onScanAnother }) {
  const MID = 0.5;
  const FULL = 0.08;
  const [snap, setSnap] = React.useState(MID);
  const [dragging, setDragging] = React.useState(false);
  const [dragOffset, setDragOffset] = React.useState(0);
  const containerRef = React.useRef(null);
  const startY = React.useRef(0);
  const startSnap = React.useRef(MID);

  const onPointerDown = (e) => {
    setDragging(true);
    startY.current = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    startSnap.current = snap;
    e.target.setPointerCapture?.(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    const y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    setDragOffset(y - startY.current);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    const h = containerRef.current?.offsetHeight || 780;
    const newSnap = startSnap.current + dragOffset / h;
    if (newSnap > 0.78) { onBack(); }
    else if (newSnap < (FULL + MID) / 2) { setSnap(FULL); }
    else { setSnap(MID); }
    setDragOffset(0);
    setDragging(false);
  };

  const topPct = Math.max(FULL, Math.min(0.95, snap + (dragging ? dragOffset / (containerRef.current?.offsetHeight || 780) : 0))) * 100;

  return (
    <div ref={containerRef} style={{ position: 'absolute', inset: 0, zIndex: 100 }}
      onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.35)' }} onClick={onBack} />
      <div style={{
        position: 'absolute', top: `${topPct}%`, left: 0, right: 0, bottom: 0,
        background: C.white, borderRadius: '20px 20px 0 0',
        display: 'flex', flexDirection: 'column',
        boxShadow: '0 -8px 30px rgba(0,0,0,0.25)',
        transition: dragging ? 'none' : 'top 0.3s cubic-bezier(.2,.8,.2,1)',
      }}>
        <div onPointerDown={onPointerDown} style={{ padding: '10px 0 8px', cursor: 'grab', touchAction: 'none', flexShrink: 0 }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: C.g5, margin: '0 auto' }} />
        </div>
        <div style={{ padding: '0 16px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <span style={{ fontFamily: C.fUI, fontSize: 17, fontWeight: 600, color: C.charcoal, whiteSpace: 'nowrap' }}>Asset tag</span>
          <button onClick={onBack} style={{ width: 32, height: 32, borderRadius: 16, background: C.g8, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>{Icon.close(18, C.g1)}</button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          <DetailContents tag={tag} compact />
        </div>
        <DetailActionBar platform={platform} tag={tag} onScanAnother={onScanAnother} />
      </div>
    </div>
  );
}

function TagDetailScreen({ platform, tag, onBack, onScanAnother, source = 'scan' }) {
  return <TagDetailPage platform={platform} tag={tag} onBack={onBack} onScanAnother={onScanAnother} fromScan={source === 'scan'} />;
}

function NotFoundScreen({ platform, serial, onBack, onScanAnother }) {
  return (
    <div style={{ position: 'absolute', inset: 0, background: C.g9, zIndex: 100, display: 'flex', flexDirection: 'column' }}>
      <div style={{ paddingTop: platform === 'ios' ? 44 : 0, background: C.white, borderBottom: `1px solid ${C.g6}` }}>
        <div style={{ height: 56, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
          <button onClick={onBack} style={{ width: 48, height: 48, background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{Icon.back(24, C.charcoal)}</button>
          <span style={{ fontFamily: C.fUI, fontSize: 17, fontWeight: 600, color: C.charcoal, flex: 1 }}>Tag not found</span>
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 28px', textAlign: 'center', alignItems: 'center' }}>
        <div style={{ width: 88, height: 88, borderRadius: 44, background: '#FFF1F2', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
          {Icon.ble(40, C.error)}
        </div>
        <h2 style={{ fontFamily: C.fUI, fontSize: 22, fontWeight: 600, color: C.charcoal, margin: '0 0 8px' }}>Tag not in your account</h2>
        <p style={{ fontFamily: C.fBody, fontSize: 15, color: C.g1, lineHeight: 1.5, margin: 0, maxWidth: 320 }}>
          We couldn't find an asset tag with serial <span style={{ fontFamily: C.fMono, color: C.charcoal, fontWeight: 500 }}>{serial}</span> in your fleet. Tags are added from the desktop console.
        </p>
        <div style={{ marginTop: 22, padding: 14, background: C.infoBg, borderRadius: 10, display: 'flex', gap: 10, alignItems: 'flex-start', textAlign: 'left', maxWidth: 320 }}>
          {Icon.warn(18, C.link)}
          <div style={{ fontFamily: C.fBody, fontSize: 13, color: C.g1, lineHeight: 1.45 }}>
            Double-check the serial — letters and numbers can look similar (0/O, 1/I). If it's correct, ask your fleet admin to add the tag in the Asset Tags page.
          </div>
        </div>
      </div>
      <div style={{ padding: `16px 16px ${platform === 'ios' ? 36 : 16}px`, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button onClick={onScanAnother} style={{ height: 48, borderRadius: 24, background: C.primary, color: C.white, border: 'none', fontFamily: C.fUI, fontSize: 15, fontWeight: 600, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>{Icon.scan(18, C.white)} Try another tag</button>
        <button onClick={onBack} style={{ height: 48, borderRadius: 24, background: C.white, color: C.charcoal, border: `1px solid ${C.g5}`, fontFamily: C.fUI, fontSize: 15, fontWeight: 500, cursor: 'pointer' }}>Back to BLE tags</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════════ */

function FleetBottomNav({ platform }) {
  const tabs = [
    { id: 'map', label: 'Live map', icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="1.6"><path d="M9 3L3 5v15l6-2 6 2 6-2V3l-6 2-6-2z"/><path d="M9 3v15M15 5v15"/></svg> },
    { id: 'vehicles', label: 'Vehicles', icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="1.6"><rect x="2" y="9" width="18" height="8" rx="2"/><circle cx="6" cy="17" r="1.5"/><circle cx="16" cy="17" r="1.5"/><path d="M5 9V7a2 2 0 012-2h8a2 2 0 012 2v2"/></svg> },
    { id: 'assets', label: 'Assets', icon: (c) => Icon.ble(22, c) },
    { id: 'routes', label: 'Routes', icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="1.6"><path d="M11 2C8 2 6 4 6 7c0 4 5 11 5 11s5-7 5-11c0-3-2-5-5-5z"/><circle cx="11" cy="7" r="2"/></svg> },
    { id: 'more', label: 'More', icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg> },
  ];
  const active = 'assets';
  const ph = platform === 'ios' ? 24 : 8;
  return (
    <div style={{ paddingBottom: ph, background: C.white, borderTop: `1px solid ${C.g6}`, display: 'flex', flexShrink: 0, position: 'relative', zIndex: 5 }}>
      {tabs.map(t => {
        const c = active === t.id ? C.primary : C.g3;
        return (
          <button key={t.id} style={{
            flex: 1, height: 56, background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
          }}>
            {t.icon(c)}
            <span style={{ fontFamily: C.fUI, fontSize: 10, fontWeight: active === t.id ? 600 : 500, color: c }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function MaponShell({ platform, tweaks, setTweak }) {
  const [state, setState] = React.useState('list');
  const [selectedTag, setSelectedTag] = React.useState(null);
  const [manualSerial, setManualSerial] = React.useState('');
  const [detailSource, setDetailSource] = React.useState('scan');

  const tagForState = React.useMemo(() => {
    const map = {
      assigned: TAGS.find(t => t.status === 'active' && t.asset && t.tracking !== false),
      unassigned: TAGS.find(t => t.status === 'unassigned'),
      inactive: TAGS.find(t => t.status === 'inactive'),
      tracking_off: TAGS.find(t => t.tracking === false),
      notfound: null,
    };
    return map[tweaks.tagState];
  }, [tweaks.tagState]);

  const openScan = () => setState('scanner');

  const onScanResult = () => {
    if (tweaks.tagState === 'notfound') {
      setManualSerial('BLE-XX-1029');
      setState('notfound');
    } else {
      setSelectedTag(tagForState);
      setDetailSource('scan');
      setState('detail');
    }
  };

  const goManual = () => setState('manual');
  const onManualSubmit = (val) => {
    setManualSerial(val);
    if (tweaks.tagState === 'notfound') { setState('notfound'); }
    else { setSelectedTag(tagForState); setDetailSource('scan'); setState('detail'); }
  };

  const onTagFromList = (tag) => {
    setSelectedTag(tag);
    setDetailSource('list');
    setState('detail');
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: C.g9, position: 'relative' }}>
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        <TagListScreen platform={platform} onScan={openScan} onTag={onTagFromList} tweaks={tweaks} />
        {state === 'scanner' && (
          <ScannerScreen
            platform={platform}
            permissionState={tweaks.permission}
            damaged={tweaks.tagState === 'damaged'}
            onClose={() => setState('list')}
            onManual={goManual}
            onResult={onScanResult}
            onPermission={() => setTweak('permission', 'granted')}
          />
        )}
        {state === 'manual' && (
          <ManualEntry
            platform={platform}
            notFound={false}
            onClose={() => setState('scanner')}
            onSubmit={onManualSubmit}
          />
        )}
        {state === 'detail' && selectedTag && (
          <TagDetailScreen
            platform={platform}
            tag={selectedTag}
            source={detailSource}
            onBack={() => setState('list')}
            onScanAnother={() => setState('scanner')}
          />
        )}
        {state === 'notfound' && (
          <NotFoundScreen
            platform={platform}
            serial={manualSerial || 'BLE-XX-1029'}
            onBack={() => setState('list')}
            onScanAnother={() => setState('scanner')}
          />
        )}
      </div>
      <FleetBottomNav platform={platform} />
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
   ═══════════════════════════════════════════════════════ */

const TWEAK_DEFAULTS = {
  "tagState": "assigned",
  "permission": "granted",
  "listState": "populated"
};

function DeviceColumn({ label, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
      <span style={{ fontFamily: 'Inter', fontSize: 11, fontWeight: 600, color: '#797F82', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</span>
      {children}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <div style={{
      minHeight: '100vh',
      padding: '40px 32px 64px',
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 28,
      background: 'radial-gradient(ellipse at top, #fafafa 0%, #ececec 100%)',
    }}>
      <header style={{ textAlign: 'center', maxWidth: 720 }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '4px 12px', background: '#F1F8E0', border: '1px solid #CFE69A', borderRadius: 20, marginBottom: 12 }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#65B200' }} />
          <span style={{ fontFamily: 'Inter', fontSize: 11, fontWeight: 600, color: '#3B6A00', letterSpacing: '0.04em', textTransform: 'uppercase' }}>Mapon Mobile · Concept</span>
        </div>
        <h1 style={{ fontFamily: 'Inter', fontSize: 30, fontWeight: 600, color: '#1F292F', margin: '0 0 6px', letterSpacing: '-0.02em' }}>Asset Tracking</h1>
        <p style={{ fontFamily: 'Roboto', fontSize: 14, color: '#797F82', lineHeight: 1.5, margin: 0 }}>
          Scan a tag's QR/barcode in the field, see which asset it belongs to, and confirm activity — built for one‑handed use. Use the <strong style={{ color: '#1F292F' }}>Tweaks</strong> panel (toolbar) to walk through every state.
        </p>
      </header>

      <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start', flexWrap: 'wrap', justifyContent: 'center' }}>
        <DeviceColumn label="iOS">
          <IOSDevice width={390} height={780}>
            <MaponShell platform="ios" tweaks={tweaks} setTweak={setTweak} />
          </IOSDevice>
        </DeviceColumn>
        <DeviceColumn label="Android">
          <AndroidDevice width={390} height={780}>
            <MaponShell platform="android" tweaks={tweaks} setTweak={setTweak} />
          </AndroidDevice>
        </DeviceColumn>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Tag state (drives scan result)">
          <TweakRadio
            value={tweaks.tagState}
            onChange={v => setTweak('tagState', v)}
            options={[
              { value: 'assigned', label: 'Assigned' },
              { value: 'unassigned', label: 'Unassigned' },
              { value: 'inactive', label: 'Inactive' },
              { value: 'tracking_off', label: 'Tracking off' },
              { value: 'notfound', label: 'Not found' },
              { value: 'damaged', label: 'Damaged' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Camera permission">
          <TweakRadio
            value={tweaks.permission}
            onChange={v => setTweak('permission', v)}
            options={[
              { value: 'granted', label: 'Granted' },
              { value: 'denied', label: 'Denied' },
            ]}
          />
        </TweakSection>
        <TweakSection title="List state">
          <TweakRadio
            value={tweaks.listState}
            onChange={v => setTweak('listState', v)}
            options={[
              { value: 'populated', label: 'Populated' },
              { value: 'no_recent', label: 'No recent' },
              { value: 'empty', label: 'Empty' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
